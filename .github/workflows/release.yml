name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: "0.15.2"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            zig-arch: aarch64-macos
          - target: x86_64-apple-darwin
            os: macos-latest
            zig-arch: aarch64-macos
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            zig-arch: x86_64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-${{ matrix.zig-arch }}-${ZIG_VERSION}.tar.xz"
          tar xf zig.tar.xz
          echo "$PWD/zig-${{ matrix.zig-arch }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          archive="phantom-${tag}-${{ matrix.target }}.tar.gz"
          staging="phantom-${tag}-${{ matrix.target }}"

          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/phantom" "${staging}/"
          cp "target/${{ matrix.target }}/release/phantom-daemon" "${staging}/"

          # Include docs if present
          for f in README.md LICENSE; do
            [ -f "$f" ] && cp "$f" "${staging}/"
          done

          tar czf "${archive}" "${staging}"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: phantom-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
